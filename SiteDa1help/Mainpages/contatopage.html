<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contatopage.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <title>Da1Help. - Contato</title>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="glass-header">
        <div class="nav-container">
            <a href="homepage.html" class="logo">Da1Help.</a>
            <nav class="user-menu">
                <a href="sobrepage.html" class="nav-link">Sobre</a>
                <a href="contatopage.html" class="nav-link">Contato</a>
                <a href="loginpage.html" class="btn-ghost">Entrar</a>
                <a href="registerpage.html" class="btn-primary">Criar conta</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1>Fale <span class="text-gradient">Conosco</span></h1>
            <p>Tem alguma dúvida ou sugestão? Escolha um canal e mande uma mensagem.</p>
        </div>

        <div class="info-grid">
            <div class="glass-card contact-card">
                <div class="icon">📱</div>
                <h3>WhatsApp</h3>
                <p>(99) 99999-9999</p>
                <span class="sub-text">Seg a Sex, 9h às 18h</span>
            </div>
            
            <div class="glass-card contact-card">
                <div class="icon">📧</div>
                <h3>E-mail</h3>
                <p>contato@help.com</p>
                <span class="sub-text">Respondemos em até 2h</span>
            </div>
            
            <div class="glass-card contact-card">
                <div class="icon">📍</div>
                <h3>Endereço</h3>
                <p>Rua Padre Nestor C. Maranhão, 40</p>
                <span class="sub-text">Porto Ferreira - SP</span>
            </div>
        </div>
    </main>
</body>
</html>
