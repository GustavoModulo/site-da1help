<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="esquecipassword.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <title>Da1Help. - Recuperar Senha</title>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="glass-header">
        <div class="nav-container">
            <a href="homepage.html" class="logo">Da1Help.</a>
            <nav class="user-menu">
                <a href="sobrepage.html" class="nav-link">Sobre</a>
                <a href="contatopage.html" class="nav-link">Contato</a>
                <a href="loginpage.html" class="btn-ghost">Entrar</a>
                <a href="registerpage.html" class="btn-primary">Criar conta</a>
            </nav>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="glass-form">
            <h2>Recuperar Senha</h2>
            <p>Digite seu e-mail e enviaremos um link seguro para você redefinir sua senha.</p>
            
            <form>
                <div class="input-group">
                    <label for="emailRec">Seu E-mail</label>
                    <input type="email" id="emailRec" placeholder="nome@exemplo.com" required>
                </div>
                
                <button type="submit" class="btn-submit">Enviar Link de Recuperação</button>
                <p class="switch-auth"><a href="loginpage.html">Voltar para o Login</a></p>
            </form>
        </div>
    </main>
</body>
</html>
