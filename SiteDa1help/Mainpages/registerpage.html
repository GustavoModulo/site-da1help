<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registerpage.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <title>Da1Help. - Criar Conta</title>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="glass-header">
        <div class="nav-container">
            <a href="homepage.html" class="logo">Da1Help.</a>
            <nav class="user-menu">
                <a href="sobrepage.html" class="nav-link">Sobre</a>
                <a href="contatopage.html" class="nav-link">Contato</a>
                <a href="loginpage.html" class="btn-ghost">Entrar</a>
            </nav>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="glass-form">
            <h2>Junte-se a nós</h2>
            <p>Crie sua conta e encontre os melhores profissionais.</p>
            
            <form>
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Como quer ser chamado?" required>
                </div>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="nome@exemplo.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Crie uma senha forte" required>
                </div>
                
                <button type="submit" class="btn-submit">Criar minha conta</button>
                <p class="switch-auth">Já tem uma conta? <a href="loginpage.html">Faça login</a></p>
            </form>
        </div>
    </main>
</body>
</html>
